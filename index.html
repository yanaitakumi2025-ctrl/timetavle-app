<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エグイ時間割</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>エグイ時間割</h1>

  <div id="authBox">
    <span id="userInfo">未ログイン</span>
    <button id="loginBtn">Googleでログイン</button>
    <button id="logoutBtn" style="display:none;">ログアウト</button>
  </div>

  <div class="topButtons">
    <button id="switchViewBtn">スマホ版に切り替え</button>
    <button id="editModeBtn">編集モード OFF</button>
  </div>

  <h2>年度・学期</h2>
  <div id="termBox">
    <select id="schoolYearSelect"></select>
    <select id="termSelect">
      <option value="前期">前期</option>
      <option value="後期">後期</option>
      <option value="通年">通年</option>
    </select>
  </div>

  <h2>表示設定</h2>
  <div id="settingsBox">
    <label class="settingItem">
      <input type="checkbox" id="showSaturday">
      土曜授業を表示
    </label>
    <label class="settingItem">
      <input type="checkbox" id="showSunday">
      日曜授業を表示
    </label>
  </div>

  <h2 id="courseTitle" style="display:none;">授業追加</h2>
  <div id="courseForm" style="display:none;">
    <input id="courseName" placeholder="授業名">
    <select id="courseDay">
      <option value="月">月</option>
      <option value="火">火</option>
      <option value="水">水</option>
      <option value="木">木</option>
      <option value="金">金</option>
      <option value="土" id="courseDaySatOption" style="display:none;">土</option>
      <option value="日" id="courseDaySunOption" style="display:none;">日</option>
    </select>
    <select id="coursePeriod">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>
    <input id="courseColor" type="color" value="#BBDEFB">
    <button id="addCourseBtn">追加</button>
  </div>

  <h2>課題追加</h2>
  <div id="taskForm">
    <select id="courseSelect"></select>
    <input id="taskTitle" placeholder="課題名">
    <select id="taskType">
      <option value="single">単発</option>
      <option value="weekly">毎週</option>
    </select>
    <button id="addTaskBtn">追加</button>
  </div>

  <h2>時間割（PC版）</h2>
  <div id="timetable">
    <table>
      <tbody id="timetableBody"></tbody>
    </table>
  </div>

  <h2>スマホ版（縦カード）</h2>
  <div id="mobileView" style="display:none;"></div>

  <h2>完了済み課題</h2>
  <ul id="completedList"></ul>

  <script type="module" src="main.js"></script>
</body>
</html>
